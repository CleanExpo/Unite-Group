# Long-running objective loops — Unite-Group Nexus
# These run on a cadence forever. They are NOT sprint goals — they are
# the ambient operational tempo of the swarm.

loops:
  - id: HLR-1
    project: hermes-agent
    name: "Daily 6-pager curation"
    cadence: "daily 06:00 AEST"
    inputs:
      - "2nd-brain/Outcomes/YYYY-MM-DD-1.md (last 24h)"
      - "Discovery loop findings (last 24h)"
      - "Linear deltas (last 24h)"
      - "Stripe MRR delta (24h)"
    outputs:
      - "2nd-brain/Outcomes/YYYY-MM-DD-six-pager.md"
      - "voice MP3 (5 min max)"
      - "Telegram digest push"
    review_cadence: "founder consumes 5min/day; weekly board reviews the set"
    exit_criteria: "founder explicitly retires the pager (none expected)"
    owner: hermes-strategy

  - id: HLR-2
    project: hermes-agent
    name: "Channel directory hygiene"
    cadence: "weekly Sunday 21:00 AEST"
    inputs:
      - "~/.hermes/channel_directory.json"
      - "recent persona prompts"
      - "brand essence adjective sets"
    outputs:
      - "pruned channel list"
      - "refreshed prompts"
      - "drift report"
    review_cadence: "monthly board sign-off"
    exit_criteria: "no drift detected in 4 consecutive sweeps"
    owner: hermes-strategy

  - id: HLR-3
    project: hermes-agent
    name: "Persona prompt evolution"
    cadence: "monthly (first Sunday)"
    inputs:
      - "outcomes/ correlated with persona attribution"
      - "brand-violation events"
    outputs:
      - "PRs against persona prompts"
      - "per-persona quality scorecard"
    review_cadence: "monthly board ratifies"
    exit_criteria: "6 consecutive months with no quality regression"
    owner: hermes-strategy

  - id: RLR-1
    project: restoreassist
    name: "Customer pipeline health review"
    cadence: "weekly Monday 08:00 AEST"
    inputs:
      - "Stripe RA"
      - "IICRC certification renewals"
      - "GEO ranking deltas"
      - "contractor portal usage"
    outputs:
      - "2nd-brain/Outcomes/RA-weekly-YYYY-WW.md"
      - "alerts for declining cohorts"
    review_cadence: "founder reviews weekly; quarterly deep-dive"
    exit_criteria: "never (always-on)"
    owner: restoreassist-shipit

  - id: RLR-2
    project: restoreassist
    name: "GEO + content velocity"
    cadence: "weekly (Discovery drives; this reviews its output)"
    inputs:
      - "content published this week"
      - "search-trend deltas"
      - "competitor coverage"
    outputs:
      - "gap-class proposals"
      - "RestoreAssist persona PROPOSAL backlog"
    review_cadence: "weekly via 6-pager"
    exit_criteria: "never"
    owner: restoreassist-shipit

  - id: RLR-3
    project: restoreassist
    name: "Compliance + IICRC certifications check"
    cadence: "monthly"
    inputs:
      - "IICRC certification dates"
      - "NDIA compliance changes"
      - "insurance regulator deltas"
    outputs:
      - "ESCALATE-class findings"
      - "regulatory update tickets"
    review_cadence: "monthly with legal review where applicable"
    exit_criteria: "never"
    owner: restoreassist-shipit

  - id: PLR-1
    project: pi-dev-ops
    name: "Portfolio drift sweep"
    cadence: "hourly (cheap-tier — Llama 3.3 70B via OpenRouter)"
    inputs:
      - "git log of all 11 repos"
      - "open PRs across all repos"
      - "Linear backlog deltas"
      - "applied-but-unmerged migrations"
      - "expiring secrets"
    outputs:
      - "2nd-brain/Outcomes/YYYY-MM-DD-HH-drift.md"
      - "alert chip for severity>=6"
    review_cadence: "founder reviews on alert; weekly summary"
    exit_criteria: "never"
    owner: pi-dev-ops-orchestrator

  - id: PLR-2
    project: pi-dev-ops
    name: "Test suite health across 11 repos"
    cadence: "every 30 minutes"
    inputs:
      - "GH Actions status feed per repo"
      - "test pass rates"
      - "flake rate"
    outputs:
      - "2nd-brain/Outcomes/test-health-YYYY-MM-DD.md"
    review_cadence: "alert on any repo red >2h; weekly review"
    exit_criteria: "never"
    owner: pi-dev-ops-orchestrator

  - id: PLR-3
    project: pi-dev-ops
    name: "LLM cost + latency telemetry"
    cadence: "monthly"
    inputs:
      - "Anthropic billing"
      - "OpenRouter billing"
      - "per-persona request counts"
      - "latency p50/p95/p99 per tier"
    outputs:
      - "2nd-brain/Outcomes/cost-YYYY-MM.md with tier-shift recommendations"
    review_cadence: "monthly board review; alert if any single persona >$1k/week"
    exit_criteria: "never"
    owner: pi-dev-ops-orchestrator
