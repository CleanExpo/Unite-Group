name: Deepsec weekly security scan
on:
  schedule:
    - cron: '0 13 * * 1'   # 23:00 UTC Monday = 09:00 AEST Tuesday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepsec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd .deepsec
          npm install
      - name: Run Deepsec
        run: |
          cd .deepsec
          npx deepsec scan --project-id Unite-Group
      - name: Open issue on findings
        if: failure()
        run: |
          # Ensure labels exist
          gh label create "security" --color "d73a4a" --description "Security related" 2>/dev/null || true
          gh label create "deepsec" --color "7057ff" --description "Deepsec scan" 2>/dev/null || true
          gh label create "weekly-scan" --color "008672" --description "Weekly automated scan" 2>/dev/null || true
          gh issue create \
            --title "[deepsec] Weekly scan findings $(date +%Y-%m-%d)" \
            --label "security,deepsec,weekly-scan" \
            --body "Deepsec found new issues. See run logs for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
