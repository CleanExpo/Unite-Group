<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Login to Console command center vision</title>
  <desc id="desc">Bright command center inspired login hero showing KPI strip, live topology, side rail panels, CRM digest, alerts and secure console entry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171C25"/>
      <stop offset="0.45" stop-color="#11141B"/>
      <stop offset="1" stop-color="#0A0C10"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262D3A"/>
      <stop offset="1" stop-color="#151A23"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#303848"/>
      <stop offset="1" stop-color="#1B2230"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DC143C" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#DC143C" stop-opacity="1"/>
      <stop offset="1" stop-color="#DC143C" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#2A3447" stroke-width="1" opacity="0.58"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1128" cy="420" r="460" fill="#DC143C" opacity="0.09" filter="url(#glow)"/>
  <circle cx="380" cy="190" r="300" fill="#D8DEE8" opacity="0.045" filter="url(#glow)"/>

  <!-- Login form side: visible but still leaves room for real controls -->
  <g filter="url(#shadow)">
    <rect x="86" y="138" width="430" height="624" rx="28" fill="#151A23" stroke="#2A3447" stroke-width="2"/>
    <rect x="122" y="178" width="132" height="10" rx="5" fill="#DC143C"/>
    <rect x="122" y="216" width="270" height="18" rx="9" fill="#D8DEE8" opacity="0.82"/>
    <rect x="122" y="250" width="322" height="11" rx="5.5" fill="#6E7A8C"/>
    <rect x="122" y="276" width="245" height="11" rx="5.5" fill="#6E7A8C" opacity="0.78"/>
    <rect x="122" y="342" width="322" height="56" rx="14" fill="#232B38" stroke="#3A4658"/>
    <rect x="146" y="365" width="174" height="10" rx="5" fill="#D8DEE8" opacity="0.52"/>
    <rect x="122" y="424" width="322" height="56" rx="14" fill="#232B38" stroke="#3A4658"/>
    <rect x="146" y="447" width="206" height="10" rx="5" fill="#D8DEE8" opacity="0.52"/>
    <rect x="122" y="512" width="322" height="60" rx="14" fill="#DC143C"/>
    <rect x="178" y="537" width="210" height="10" rx="5" fill="#FFFFFF" opacity="0.88"/>
    <rect x="122" y="602" width="322" height="52" rx="14" fill="#1B2230" stroke="#3A4658"/>
    <circle cx="151" cy="628" r="12" fill="#D8DEE8" opacity="0.70"/>
    <rect x="180" y="623" width="174" height="10" rx="5" fill="#D8DEE8" opacity="0.50"/>
    <rect x="122" y="704" width="182" height="8" rx="4" fill="#3D4654"/>
  </g>

  <!-- Command Center app canvas -->
  <g filter="url(#shadow)">
    <rect x="582" y="88" width="920" height="724" rx="24" fill="#0A0C10" stroke="#2A3447" stroke-width="2"/>
    <!-- top status bar -->
    <rect x="582" y="88" width="920" height="58" rx="24" fill="#141A24"/>
    <path d="M606 146H1478" stroke="#2A3447"/>
    <rect x="622" y="112" width="114" height="10" rx="5" fill="#D8DEE8"/>
    <rect x="754" y="112" width="74" height="10" rx="5" fill="#DC143C"/>
    <circle cx="1116" cy="117" r="7" fill="#D8DEE8"/>
    <rect x="1134" y="112" width="88" height="10" rx="5" fill="#6E7A8C"/>
    <circle cx="1262" cy="117" r="7" fill="#DC143C"/>
    <rect x="1280" y="112" width="54" height="10" rx="5" fill="#6E7A8C"/>
    <rect x="1370" y="106" width="92" height="22" rx="11" fill="#1B2230" stroke="#3A4658"/>

