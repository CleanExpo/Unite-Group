      <rect x="788" y="166" width="164" height="104" fill="url(#paper)" stroke="#2A3447"/>
      <rect x="970" y="166" width="164" height="104" fill="url(#paper)" stroke="#2A3447"/>
      <rect x="1152" y="166" width="164" height="104" fill="url(#paper)" stroke="#2A3447"/>
      <rect x="1334" y="166" width="144" height="104" fill="url(#paper)" stroke="#2A3447"/>
      <rect x="628" y="190" width="44" height="8" rx="4" fill="#6E7A8C"/>
      <rect x="628" y="218" width="92" height="20" rx="10" fill="#D8DEE8"/>
      <rect x="810" y="190" width="70" height="8" rx="4" fill="#6E7A8C"/>
      <rect x="810" y="218" width="108" height="20" rx="10" fill="#D8DEE8"/>
      <rect x="992" y="190" width="78" height="8" rx="4" fill="#6E7A8C"/>
      <rect x="992" y="218" width="68" height="20" rx="10" fill="#D8DEE8"/>
      <rect x="1174" y="190" width="102" height="8" rx="4" fill="#6E7A8C"/>
      <rect x="1174" y="218" width="34" height="20" rx="10" fill="#DC143C"/>
      <rect x="1356" y="190" width="54" height="8" rx="4" fill="#6E7A8C"/>
      <rect x="1356" y="218" width="76" height="20" rx="10" fill="#D8DEE8"/>
    </g>

    <!-- Zone 3 topology -->
    <rect x="606" y="292" width="592" height="332" rx="18" fill="#11141B" stroke="#2A3447"/>
    <rect x="630" y="318" width="132" height="9" rx="4.5" fill="#6E7A8C"/>
    <rect x="630" y="340" width="220" height="8" rx="4" fill="#3D4654"/>
    <path d="M902 382 C836 420 813 474 852 538" stroke="#6E7A8C" stroke-width="2" opacity="0.6"/>
    <path d="M902 382 C980 412 1014 472 980 548" stroke="#6E7A8C" stroke-width="2" opacity="0.6"/>
    <path d="M902 382 C930 448 918 508 900 580" stroke="#DC143C" stroke-width="3" opacity="0.92"/>
    <circle cx="902" cy="382" r="42" fill="#202735" stroke="#D8DEE8" stroke-width="2"/>
    <circle cx="852" cy="538" r="34" fill="#202735" stroke="#6E7A8C" stroke-width="2"/>
    <circle cx="980" cy="548" r="34" fill="#202735" stroke="#6E7A8C" stroke-width="2"/>
    <circle cx="900" cy="580" r="34" fill="#261722" stroke="#DC143C" stroke-width="3"/>
    <circle cx="731" cy="512" r="28" fill="#202735" stroke="#3D4654" stroke-width="2"/>
    <circle cx="1094" cy="504" r="28" fill="#202735" stroke="#3D4654" stroke-width="2"/>
    <rect x="872" y="374" width="60" height="7" rx="3.5" fill="#D8DEE8"/>
    <rect x="830" y="532" width="44" height="6" rx="3" fill="#6E7A8C"/>
    <rect x="958" y="542" width="44" height="6" rx="3" fill="#6E7A8C"/>
    <rect x="878" y="574" width="44" height="6" rx="3" fill="#DC143C"/>

    <!-- Side rail panels: Margot, Business 360, Daily Digest, Activity -->
    <rect x="1220" y="292" width="258" height="110" rx="16" fill="url(#card)" stroke="#2A3447"/>
    <circle cx="1250" cy="326" r="14" fill="#DC143C"/>
    <rect x="1278" y="319" width="94" height="9" rx="4.5" fill="#D8DEE8"/>
    <rect x="1242" y="358" width="206" height="10" rx="5" fill="#3D4654"/>
    <rect x="1242" y="376" width="136" height="10" rx="5" fill="#3D4654"/>

    <rect x="1220" y="420" width="258" height="120" rx="16" fill="url(#card)" stroke="#2A3447"/>
    <rect x="1242" y="444" width="112" height="9" rx="4.5" fill="#6E7A8C"/>
    <path d="M1246 510 L1276 480 L1306 496 L1336 462 L1370 486 L1406 452 L1448 474" stroke="#D8DEE8" stroke-width="3" fill="none"/>
    <circle cx="1336" cy="462" r="5" fill="#DC143C"/>

    <rect x="1220" y="558" width="258" height="114" rx="16" fill="url(#card)" stroke="#2A3447"/>
    <rect x="1242" y="582" width="110" height="9" rx="4.5" fill="#6E7A8C"/>
    <rect x="1242" y="610" width="190" height="9" rx="4.5" fill="#D8DEE8" opacity="0.82"/>
    <rect x="1242" y="632" width="150" height="9" rx="4.5" fill="#3D4654"/>

    <rect x="606" y="646" width="872" height="128" rx="16" fill="#11141B" stroke="#2A3447"/>
    <rect x="630" y="672" width="134" height="8" rx="4" fill="#6E7A8C"/>
    <circle cx="646" cy="716" r="7" fill="#D8DEE8"/>
    <rect x="668" y="711" width="188" height="10" rx="5" fill="#D8DEE8" opacity="0.78"/>
    <rect x="885" y="711" width="92" height="10" rx="5" fill="#3D4654"/>
    <circle cx="646" cy="746" r="7" fill="#DC143C"/>
    <rect x="668" y="741" width="236" height="10" rx="5" fill="#D8DEE8" opacity="0.78"/>
    <rect x="932" y="741" width="130" height="10" rx="5" fill="#3D4654"/>
  </g>

  <!-- stronger red signal sweep -->
  <rect x="610" y="812" width="862" height="2" fill="url(#redLine)" opacity="0.95"/>
</svg>
