# Nexus persistent host — Docker-local + Tailscale (Board mandate P3, 2026-06-30).
#
# Runs the Nexus operator console (workspace) and the presence writer durably so
# the cockpit survives reboots, and — on Linux — gives each lane account a real
# isolated login (creds land in CLAUDE_CONFIG_DIR, not the macOS Keychain, which
# is what blocks true 3-plan isolation on a Mac; see memory
# macos-claude-cli-keychain-lanes).
#
# The Hermes gateway (python hermes-agent venv at ~/.hermes/hermes-agent) runs on
# the HOST and is reached at host.docker.internal:8642 — it is not vendored here,
# so it is documented as an external dependency rather than a container.
#
# Validate syntax:  docker compose -f deploy/nexus-host/docker-compose.yml config
# Run (Linux host):  docker compose -f deploy/nexus-host/docker-compose.yml up -d
services:
  workspace:
    build:
      context: ../..
      dockerfile: deploy/nexus-host/Dockerfile.workspace
    image: nexus/workspace:local
    restart: unless-stopped          # reboot-survival (P3 DoD)
    environment:
      HERMES_API_URL: "http://host.docker.internal:8642"
      HERMES_API_TOKEN: "${API_SERVER_KEY}"
      HERMES_DASHBOARD_TOKEN: "${API_SERVER_KEY}"
      CLAUDE_DASHBOARD_TOKEN: "${API_SERVER_KEY}"
      KNOWLEDGE_DIR: "/vault"
      OBSIDIAN_VAULT: "/vault"
      HOST: "0.0.0.0"
      PORT: "3000"
      # Non-loopback exposure REQUIRES this (server-entry enforces it).
      HERMES_PASSWORD: "${HERMES_PASSWORD}"
    volumes:
      - "${VAULT_DIR}:/vault:ro"
      - "${HERMES_ACCOUNTS_DIR}:/root/.hermes/accounts"   # per-account lane logins (Linux: dedicated)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3000:3000"        # bind loopback; expose via Tailscale, not 0.0.0.0

  presence:
    build:
      context: ../..
      dockerfile: deploy/nexus-host/Dockerfile.presence
    image: nexus/presence:local
    restart: unless-stopped          # reboot-survival (P3 DoD)
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"   # founder-entered secret
      FOUNDER_USER_ID: "${FOUNDER_USER_ID}"
      HERMES_API_URL: "http://host.docker.internal:8642"
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Tailscale: run the gateway + this compose behind tailscaled on the host so the
# deployed web CC reaches the operator over the tailnet, never the public net.
# (No port is published beyond loopback above.)
