# Unite-Group Nexus — tiered goal tree
# Generated 2026-05-26. Owners are agent IDs (see hermes-*, restoreassist-*, pi-dev-ops-* in agent_roles).

north_star:
  id: NS-1
  statement: >
    Build a portfolio operating system where >80% of shipped value originates
    and executes through agents end-to-end, putting the Unite-Group Nexus on
    a credible trajectory to a $2B-scale business outcome.
  why: >
    Compound execution removes the founder-attention ceiling that otherwise
    caps every product at Phill's personal throughput.
  success_metric:
    - "autonomous_share_of_merged_prs_24mo >= 0.80"
    - "arr_run_rate_at_M24 >= $150M  (12-15x SaaS multiple → $2B valuation)"
  deadline: 2028-05-26
  dependencies: [PG-HERMES, PG-RESTOREASSIST, PG-PI-DEV-OPS]
  risk: HIGH
  owner: phill+hermes-strategy

program_goals:
  - id: PG-HERMES
    project: hermes-agent
    statement: >
      Hermes becomes the sole founder/partner input surface to the Nexus —
      voice + Telegram + structured intake, no manual git or IDE typing for
      new initiatives.
    why: "Founder time is the binding constraint."
    success_metric:
      - "founder_initiated_work_via_hermes_M12 >= 0.90"
      - "six_pager_voice_consumption_consecutive_days >= 30"
      - "hitl_gate_active_for_external_customers: true"
    deadline: 2027-05-26
    dependencies: [SG-H1, SG-H2, SG-H3, PG-PI-DEV-OPS]
    risk: MEDIUM
    owner: hermes-strategy

  - id: PG-RESTOREASSIST
    project: restoreassist
    statement: >
      RestoreAssist becomes the proof-product that the autonomous engine
      compounds revenue — 10x MRR with founder-attention flat.
    why: >
      The 11-product portfolio thesis needs ONE product that demonstrably
      scales without founder coding.
    success_metric:
      - "ra_mrr_M18 >= 10 * ra_mrr_M0"
      - "ra_autonomous_pr_share_M18 >= 0.85"
      - "founder_hours_per_week_on_ra_M18 <= founder_hours_per_week_on_ra_M0"
    deadline: 2027-11-26
    dependencies: [PG-PI-DEV-OPS, SG-R1, SG-R2, SG-R3]
    risk: MEDIUM
    owner: restoreassist-shipit

  - id: PG-PI-DEV-OPS
    project: pi-dev-ops
    statement: >
      Pi-Dev-Ops matures into a production-grade autonomous orchestrator
      that safely operates all 11 portfolio products.
    why: "Meta-platform — without it every other goal stalls."
    success_metric:
      - "personas_live_in_discovery_M6 == 13"
      - "auto_merge_gate_live: true"
      - "outcomes_feedback_table_writing: true"
      - "brand_resonance_agent_scoring_all_13_personas: true"
      - "gh_app_push_live: true"
    deadline: 2026-11-26
    dependencies: [SG-P1, SG-P2, SG-P3]
    risk: MEDIUM
    owner: pi-dev-ops-orchestrator

