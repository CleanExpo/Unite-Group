name: Monorepo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  web:
    name: apps/web — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run type-check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          # Placeholders keep compile/static-generation verifiable before repo
          # secrets are wired; production uses real Vercel env vars.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
          NEXT_PUBLIC_APP_URL: https://unite-group.vercel.app
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-placeholder-anthropic-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}
          VAULT_ENCRYPTION_KEY: ${{ secrets.VAULT_ENCRYPTION_KEY || '12345678901234567890123456789012' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'ci-placeholder-cron-secret' }}
          FOUNDER_USER_ID: ${{ secrets.FOUNDER_USER_ID || '00000000-0000-0000-0000-000000000000' }}

  workspace:
    name: apps/workspace — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workspace
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm run check` (strict lint + typecheck) carries ~466 pre-existing
      # errors inherited from upstream hermes-workspace. Gate is build-only
      # until the debt is burned down — tracked in docs/convergence/migration-map.md.
      - name: Build
        run: pnpm run build

  mcp:
    name: packages/pi-ceo-operator-mcp — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pi-ceo-operator-mcp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: apps/web — Playwright E2E
    runs-on: ubuntu-latest
    needs: [web]
    # Opt-in gate: set the E2E_ENABLED repo variable to 'true' and wire the
    # E2E_SUPABASE_* secrets (pointing to the dedicated non-prod e2e-gate branch).
    if: vars.E2E_ENABLED == 'true'
    defaults:
      run:
        working-directory: apps/web
    env:
      # Route the E2E lane to the dedicated non-prod Supabase branch.
      # Falls back to prod secrets so the job fails loudly rather than silently
      # hitting prod if the E2E secrets are not yet configured.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      # Read directly by supabase-admin-config.ts to bypass the prod-only host assertion.
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}
      NEXT_PUBLIC_APP_URL: https://unite-hub-sandbox.vercel.app
      # Dev server needs these to boot without crashing on missing vars.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-placeholder-anthropic-key' }}
      VAULT_ENCRYPTION_KEY: ${{ secrets.VAULT_ENCRYPTION_KEY || '12345678901234567890123456789012' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'ci-placeholder-cron-secret' }}
      FOUNDER_USER_ID: ${{ secrets.FOUNDER_USER_ID || '00000000-0000-0000-0000-000000000000' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  spec-board:
    name: apps/spec-board — type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spec-board
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Fabel reads these only at request time, not at build; placeholders
          # keep the static build verifiable before repo secrets are wired.
          SUPABASE_URL: ${{ secrets.FABEL_SUPABASE_URL || 'https://example.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FABEL_SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-placeholder-anthropic-key' }}
