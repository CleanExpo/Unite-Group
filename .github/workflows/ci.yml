name: Monorepo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  au-english:
    name: Australian-English content guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/check-au-english.mjs

  web:
    name: apps/web — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run type-check

      - name: Test
        run: pnpm run test

      - name: Build
        # The shared wrapper supplies fixed structural placeholders through an
        # exact build-only environment. Local and CI verification cannot drift
        # or accidentally compile against live service/provider credentials.
        run: node ../../scripts/verify-web-ci-build.mjs

  workspace:
    name: apps/workspace — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workspace
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: apps/workspace/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Type-check AND tests are now enforced: the inherited hermes-workspace type
      # drift was burned to zero and the 6 brittle tests fixed (W1 of
      # docs/specs/next-phase-repair-enhancement.spec.md). These gates stop silent
      # regression. Lint (`pnpm run check`) still carries ~459 pre-existing errors
      # and stays ungated until that debt is burned down.
      # NOTE: the job name stays "apps/workspace — build" so the branch-protection
      # required-check context keeps matching; it now also runs type-check + test.
      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  autopilot:
    name: apps/autopilot-runner — test, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/autopilot-runner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/autopilot-runner/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Verify retired runner container boundary
        run: npm run verify:container

  project-readiness:
    name: Nexus project-readiness P0 gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test readiness kernel
        run: node --test scripts/__tests__/check-env.test.mjs scripts/__tests__/dependency-audit.test.mjs scripts/__tests__/nexus-project-readiness.test.mjs scripts/__tests__/verify-web-ci-build.test.mjs scripts/__tests__/workflow-supply-chain.test.mjs

      - name: Enforce configured P0 findings
        run: node scripts/nexus-project-readiness.mjs --root . --json --gate

  docs-watch:
    name: Nexus official-docs watcher — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test bounded watcher and committed baseline
        run: npm run verify:docs-watch

  dependency-audit:
    name: Active lockfiles — high-severity dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # npm retired the classic audit endpoint on 15/07/2026 (HTTP 410:
      # "use the bulk advisory endpoint"); pnpm 9.x/10.x still call it, so
      # `pnpm@9.15.0 audit` fails on every run. pnpm 11 audits via the bulk
      # advisory endpoint — audit-only version bump here; the workspaces'
      # pinned packageManager (9.15.0) is untouched, hence --pm-on-fail=ignore
      # to bypass pnpm 11's packageManager-mismatch guard for this read-only
      # audit. Verified locally 15/07/2026: pnpm@11.13.0 audit resolves the
      # full apps/web tree (1485 deps) and both workspaces report clean.
      - name: Audit every tracked JavaScript lockfile
        run: node scripts/audit-active-lockfiles.mjs --output dependency-audit-results.json

      - name: Upload dependency audit matrix
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-audit-results
          path: dependency-audit-results.json
          retention-days: 14

  mcp:
    name: packages/pi-ceo-operator-mcp — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pi-ceo-operator-mcp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/pi-ceo-operator-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  spine:
    name: packages/spine — type-check and bounded tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/spine/packages/spine
    env:
      # Integration tests fail closed or self-report a skip when this dedicated
      # non-production connection is absent. Production credentials are never a fallback.
      SPINE_DATABASE_URL: ${{ secrets.SPINE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/spine/packages/spine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

  e2e:
    name: apps/web — Playwright E2E
    runs-on: ubuntu-latest
    # Guard against the Playwright browser-install step hanging indefinitely
    # (observed sitting "pending" for hours, up to GitHub's 6h default). Fail
    # fast instead so the gate gives a clear signal rather than blocking forever.
    timeout-minutes: 20
    needs: [web]
    # Opt-in gate: set the E2E_ENABLED repo variable to 'true' and wire the
    # E2E_SUPABASE_* secrets (pointing to the dedicated non-prod e2e-gate branch).
    # Dependabot-triggered runs cannot read repo secrets (GitHub policy), so the
    # E2E lane would always fail on the placeholder key — skip it for dependabot.
    if: vars.E2E_ENABLED == 'true' && github.actor != 'dependabot[bot]'
    defaults:
      run:
        working-directory: apps/web
    env:
      # Route the E2E lane only to the dedicated non-prod Supabase branch.
      # Placeholders make missing E2E credentials fail loudly; production
      # credentials are deliberately outside this job's authority boundary.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      # Read directly by supabase-admin-config.ts to bypass the prod-only host assertion.
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}
      NEXT_PUBLIC_APP_URL: https://unite-hub-sandbox.vercel.app
      # Structural placeholders let the dev server boot without granting the
      # browser suite any production provider, vault, cron, or founder secret.
      ANTHROPIC_API_KEY: ci-placeholder-anthropic-key
      VAULT_ENCRYPTION_KEY: '12345678901234567890123456789012'
      CRON_SECRET: ci-placeholder-cron-secret
      FOUNDER_USER_ID: '00000000-0000-0000-0000-000000000000'
      # Authenticated E2E specs read these directly and fail closed if the
      # test-user secrets are absent. Values are supplied by GitHub secrets only.
      PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
      PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
      # The founder-access allow-list (src/lib/auth/private-access.ts) gates
      # /founder. Allow-list the E2E test user so the authenticated specs can
      # reach founder routes after login — otherwise proxy.ts blocks them and
      # loginAsFounder() times out waiting for /founder/dashboard.
      FOUNDER_ALLOWED_EMAILS: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
      # Opt-in for the destructive/provisioning specs (createUser + DB writes).
      # Only set the E2E_ALLOW_PROVISIONING repo variable to 'true' when
      # E2E_SUPABASE_* points at a dedicated non-prod backend — never prod.
      E2E_ALLOW_PROVISIONING: ${{ vars.E2E_ALLOW_PROVISIONING }}
      # The E2E suite fires many requests from one IP; disable the per-IP
      # rate limiter (prod-guarded in rate-limit.ts) so it doesn't 429 the run.
      E2E_DISABLE_RATE_LIMIT: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Verify hosted Chrome is available
        run: google-chrome --version

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  spec-board:
    name: apps/spec-board — type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spec-board
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/spec-board/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Fabel reads these only at request time, not at build; placeholders
          # keep the static build verifiable before repo secrets are wired.
          SUPABASE_URL: ${{ secrets.FABEL_SUPABASE_URL || 'https://example.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FABEL_SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}

  gitleaks:
    name: gitleaks — secret scan (git commits)
    runs-on: ubuntu-latest
    steps:
      # Full history so the action can scan the event's commit range.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan git history for secrets
        # Pinned to the full commit SHA of gitleaks-action v3.0.0 for supply-chain
        # integrity. Runs in git mode (scans commits), config is .gitleaks.toml.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action requires a license only for GitHub organizations.
          # Harmless (unused) for a personal-account repo; passed through so the
          # job keeps working if the repo later moves under an org.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-placeholder-anthropic-key' }}
