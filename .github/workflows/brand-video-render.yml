name: Brand Video Render

# Runs the Brand Video Studio worker where ffmpeg + a real runtime exist (a
# Vercel function can't run ffmpeg or long jobs). Each run claims ONE queued
# brand_video_jobs row from Supabase (service role), renders it
# (Gemini images -> ElevenLabs VO -> ffmpeg 1080p stitch), uploads the mp4 to
# the BRAND_VIDEO_BUCKET Storage bucket, and sets status=done + output_url.
#
# Runs only when requested manually. Automated queue dispatch is deferred until
# the production GitHub credential is genuinely connected and can be canaried.

on:
  workflow_dispatch:

permissions:
  contents: read

# Don't pile up overlapping render runs.
concurrency:
  group: brand-video-render
  cancel-in-progress: false

jobs:
  render:
    name: Claim + render one queued job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install apps/web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Render queued brand_video_jobs
        working-directory: apps/web
        run: node scripts/brand-video-worker.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRAND_VIDEO_BUCKET: ${{ secrets.BRAND_VIDEO_BUCKET }}
