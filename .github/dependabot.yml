# Dependabot — converts upstream CVEs and drift into reviewable weekly PRs.
# Grouped minor/patch rollups per package keep the PR volume tolerable;
# majors surface individually. Mirrors RestoreAssist's RA-1594 config.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/apps/workspace"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/packages/pi-ceo-operator-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
