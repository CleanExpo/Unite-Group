# Forward-proxy allowlist for the harness sidecar (spec §9 network topology).
# Deny-by-default: only explicitly allowlisted destination domains may egress.
# api.anthropic.com is NEVER listed -> "$0 Max" is a NETWORK fact, not a promise.

http_port 3128

# --- allowlist (public-run set) ---
acl allowed_dst dstdomain .openrouter.ai
acl allowed_dst dstdomain .api.minimax.io
# (confidential runs use an empty allowlist + a single host.docker.internal CONNECT rule)

# CONNECT (TLS) only to allowlisted hosts on 443
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow allowed_dst
http_access deny CONNECT !allowed_dst
http_access deny all          # deny-by-default — everything not allowlisted is blocked

# never write request bodies/headers that could carry secrets
forwarded_for delete
via off
