# Forward-proxy allowlist for the CONFIDENTIAL lane (spec §9 — confidential runs).
# The agent container sits on a Docker `--internal` network (no route off-box).
# A plain `--internal` network severs EVERYTHING — including Docker Model Runner —
# so confidential local inference is reached the same way public egress is governed:
# through this proxy, which allowlists ONLY the local Model Runner host over HTTP.
# No internet destination is allowlisted -> internet egress is impossible by construction.

http_port 3128

# --- allowlist (confidential set): the local model host, nothing else ---
acl local_model dstdomain model-runner.docker.internal
acl Safe_ports port 80          # Model Runner in-container endpoint is plain HTTP

http_access allow local_model
http_access deny all            # deny-by-default — no internet, no other host

# never write request bodies/headers that could carry secrets
forwarded_for delete
via off
